<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KubaFlix</title>

<style>

body{
background:#141414;
font-family:Arial;
color:white;
margin:0;
}

header{
background:black;
padding:15px;
font-size:28px;
font-weight:bold;
color:red;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
padding:20px;
}

.movie{
cursor:pointer;
transition:0.2s;
}

.movie:hover{
transform:scale(1.08);
}

.movie img{
width:100%;
border-radius:6px;
}

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

video{
width:80%;
max-height:80%;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:40px;
cursor:pointer;
}

</style>
</head>

<body>

<header>KUBAFLIX</header>

<div class="grid" id="movies"></div>

<div id="player">
<div class="close" onclick="closePlayer()">✖</div>
<video controls id="videoPlayer"></video>
</div>

<script>

fetch("videos.json")
.then(r=>r.json())
.then(data=>{

let grid=document.getElementById("movies")

data.forEach(movie=>{

let div=document.createElement("div")
div.className="movie"

div.innerHTML=`
<img src="${movie.poster}">
<p>${movie.title}</p>
`

div.onclick=()=>play(movie.video)

grid.appendChild(div)

})

})

function play(src){
let player=document.getElementById("player")
let video=document.getElementById("videoPlayer")

video.src=src
player.style.display="flex"
video.play()
}

function closePlayer(){
let player=document.getElementById("player")
let video=document.getElementById("videoPlayer")

video.pause()
player.style.display="none"
}

</script>

</body>
</html>
